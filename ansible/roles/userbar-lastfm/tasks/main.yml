---
- name: Ensure app directory exists
  ansible.builtin.file:
    path: "{{ userbar_lastfm_app_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: yes

- name: Sync application code
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../"
    dest: "{{ userbar_lastfm_app_dir }}/"
    rsync_opts:
      - "--exclude=ansible/"
      - "--exclude=.git/"
      - "--exclude=__pycache__/"
      - "--exclude=*.pyc"
  register: _sync

- name: Build Docker image
  community.docker.docker_image:
    name: "{{ userbar_lastfm_image }}"
    tag: latest
    source: build
    build:
      path: "{{ userbar_lastfm_app_dir }}"
      pull: false
    force_source: "{{ _sync.changed }}"
  become: yes

- name: Deploy container
  community.docker.docker_container:
    name: "{{ userbar_lastfm_container_name }}"
    image: "{{ userbar_lastfm_image }}:latest"
    state: started
    restart_policy: unless-stopped
    recreate: "{{ _sync.changed }}"
    networks:
      - name: "{{ docker_network }}"
    env:
      SECRET_KEY: "{{ infisical_secrets.secrets['lastfm-shared-secret-lastfm-userbar'] }}"
      LASTFM_API_KEY: "{{ infisical_secrets.secrets['lastfm-api-key-lastfm-userbar'] }}"
  become: yes

- name: Deploy nginx upstream config
  ansible.builtin.template:
    src: upstream.conf.j2
    dest: "{{ nginx_custom_upstream_path }}/{{ userbar_lastfm_domain }}.conf"
    mode: '0644'
  become: yes
  notify: Reload nginx

- name: Deploy nginx location config
  ansible.builtin.template:
    src: location.conf.j2
    dest: "{{ nginx_confd_path }}/{{ userbar_lastfm_domain }}-custom-locations/location.conf"
    mode: '0644'
  become: yes
  notify: Reload nginx
...
