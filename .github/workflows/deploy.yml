name: Trigger deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Send repository_dispatch to infra repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'soksanichenko',
              repo: 'infra',
              event_type: 'deploy-userbar-lastfm',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
                triggered_by: context.eventName,
                service: 'userbar-lastfm',
              },
            });
